openapi: "3.1.0"
info:
  title: Adversarial — Missing operationId
  version: "1.0.0"
  description: >
    Spec where no operation defines an operationId.
    specmcp must derive stable IDs from method + path for all operations,
    and resolve collisions when two paths produce the same derived name.

servers:
  - url: https://api.example.com/v1

paths:
  /users:
    get:
      # No operationId → derived: get_users
      summary: List users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      # No operationId → derived: post_users
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      # No operationId → derived: get_users_id
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

    put:
      # No operationId → derived: put_users_id
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      # No operationId → derived: delete_users_id
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /items:
    get:
      # No operationId → derived: get_items
      summary: List items
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /items/{id}:
    get:
      # No operationId → derived: get_items_id  (parallel to get_users_id — no collision)
      summary: Get an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The item

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        email:
          type: string

    UserInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
