name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }
      - run: uv sync --dev
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/
      - run: uv run mypy src/specmcp

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }
      - run: uv sync --dev
      - run: uv run pytest tests/unit -v

  test-integration-vendored:
    name: Integration tests (vendored specs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }
      - run: uv sync --dev
      - run: uv run pytest tests/integration -v -k "petstore or jsonplaceholder or adversarial"

  test-integration-corpus:
    name: Integration tests (fetched corpus, ≥80% conversion)
    runs-on: ubuntu-latest
    # Only run on main and PRs that touch core pipeline code
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-corpus')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }
      - run: uv sync --dev
      - name: Fetch corpus specs
        run: uv run python scripts/fetch_corpus.py
      - name: Cache fetched specs
        uses: actions/cache@v4
        with:
          path: test-corpus/.cache
          key: corpus-${{ hashFiles('test-corpus/manifest.yaml') }}
      - run: uv run pytest tests/integration -v -k "corpus"
        env:
          SPECMCP_CORPUS_MIN_SUCCESS_RATE: "0.80"
