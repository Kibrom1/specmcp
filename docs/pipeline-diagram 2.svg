<svg viewBox="0 0 820 620" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="820" height="620" fill="#0f172a" rx="16"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700" letter-spacing="0.5">specmcp — OpenAPI → MCP Conversion Pipeline</text>

  <!-- ═══════════════════════════════════════════════════
       LEFT COLUMN: Pipeline stages
       ═══════════════════════════════════════════════════ -->

  <!-- INPUT box (amber) -->
  <rect x="40" y="60" width="200" height="52" rx="8" fill="#92400e" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="81" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="600">INPUT</text>
  <text x="140" y="98" text-anchor="middle" fill="#fde68a" font-size="10">OpenAPI 3.x spec (JSON/YAML)</text>

  <!-- Arrow INPUT → LOAD -->
  <line x1="140" y1="112" x2="140" y2="132" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <!-- Artifact label -->
  <text x="148" y="126" fill="#94a3b8" font-size="9" font-style="italic">raw dict + $ref resolved</text>

  <!-- ① LOAD -->
  <rect x="40" y="132" width="200" height="52" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="153" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">① LOAD</text>
  <text x="140" y="170" text-anchor="middle" fill="#a5b4fc" font-size="10">load_spec() · prance resolver</text>

  <!-- Arrow LOAD → NORMALIZE -->
  <line x1="140" y1="184" x2="140" y2="204" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="148" y="199" fill="#94a3b8" font-size="9" font-style="italic">ResolvedSpec</text>

  <!-- ② NORMALIZE -->
  <rect x="40" y="204" width="200" height="52" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="225" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">② NORMALIZE</text>
  <text x="140" y="242" text-anchor="middle" fill="#a5b4fc" font-size="10">normalize() · filter · flatten</text>

  <!-- Arrow NORMALIZE → SIMPLIFY -->
  <line x1="140" y1="256" x2="140" y2="276" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="148" y="271" fill="#94a3b8" font-size="9" font-style="italic">list[Operation]</text>

  <!-- ③ SIMPLIFY -->
  <rect x="40" y="276" width="200" height="52" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="297" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">③ SIMPLIFY</text>
  <text x="140" y="314" text-anchor="middle" fill="#a5b4fc" font-size="10">simplify() · ArgumentMap</text>

  <!-- Arrow SIMPLIFY → EXPOSE -->
  <line x1="140" y1="328" x2="140" y2="348" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="148" y="343" fill="#94a3b8" font-size="9" font-style="italic">list[SimplifiedOperation + ArgMap]</text>

  <!-- ④ EXPOSE -->
  <rect x="40" y="348" width="200" height="52" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="369" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">④ EXPOSE</text>
  <text x="140" y="386" text-anchor="middle" fill="#a5b4fc" font-size="10">ToolRegistry · input_schema</text>

  <!-- Arrow EXPOSE → MCP SERVER -->
  <line x1="140" y1="400" x2="140" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="148" y="415" fill="#94a3b8" font-size="9" font-style="italic">ToolRegistry</text>

  <!-- ⑤ MCP SERVER -->
  <rect x="40" y="420" width="200" height="52" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="441" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">⑤ MCP SERVER</text>
  <text x="140" y="458" text-anchor="middle" fill="#a5b4fc" font-size="10">stdio · tools/list + tools/call</text>

  <!-- ═══════════════════════════════════════════════════
       RIGHT COLUMN: Runtime dispatch loop
       ═══════════════════════════════════════════════════ -->

  <!-- Section label -->
  <text x="590" y="57" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="0.5">RUNTIME (tools/call)</text>

  <!-- LLM Agent (amber) -->
  <rect x="480" y="68" width="220" height="48" rx="8" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="88" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="700">LLM Agent</text>
  <text x="590" y="105" text-anchor="middle" fill="#fde68a" font-size="10">tools/call {name, arguments}</text>

  <!-- Arrow LLM → Auth -->
  <line x1="590" y1="116" x2="590" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Auth Injector (amber) -->
  <rect x="480" y="140" width="220" height="48" rx="8" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="160" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="700">Auth Injector</text>
  <text x="590" y="177" text-anchor="middle" fill="#fde68a" font-size="10">Resolves credentials · injects headers</text>

  <!-- Arrow Auth → Dispatcher -->
  <line x1="590" y1="188" x2="590" y2="212" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Dispatcher (indigo) -->
  <rect x="480" y="212" width="220" height="48" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="590" y="232" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">Dispatcher</text>
  <text x="590" y="249" text-anchor="middle" fill="#a5b4fc" font-size="10">ArgMap → path/query/headers/body</text>

  <!-- Arrow Dispatcher → HttpClient -->
  <line x1="590" y1="260" x2="590" y2="284" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- HTTP Client (sky blue) -->
  <rect x="480" y="284" width="220" height="48" rx="8" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
  <text x="590" y="304" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="700">HTTP Client</text>
  <text x="590" y="321" text-anchor="middle" fill="#bae6fd" font-size="10">httpx · timeout · retry · size guard</text>

  <!-- Arrow HttpClient → Upstream -->
  <line x1="590" y1="332" x2="590" y2="356" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Upstream API (green) -->
  <rect x="480" y="356" width="220" height="48" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="590" y="376" text-anchor="middle" fill="#dcfce7" font-size="11" font-weight="700">Upstream API</text>
  <text x="590" y="393" text-anchor="middle" fill="#bbf7d0" font-size="10">Real HTTP endpoint</text>

  <!-- Response arrow (dashed, going back up the right side) -->
  <path d="M 710 380 Q 760 380 760 308 Q 760 236 760 164 Q 760 116 710 108"
        fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,4"
        marker-end="url(#arrow-green)"/>
  <text x="763" y="252" fill="#4ade80" font-size="9" text-anchor="start">response</text>
  <text x="763" y="263" fill="#4ade80" font-size="9" text-anchor="start">→ MCP</text>
  <text x="763" y="274" fill="#4ade80" font-size="9" text-anchor="start">text block</text>

  <!-- ═══════════════════════════════════════════════════
       Horizontal connector: MCP SERVER → LLM Agent loop
       ═══════════════════════════════════════════════════ -->
  <!-- Dashed MCP protocol arrow: MCP SERVER → Runtime column -->
  <path d="M 240 446 Q 360 446 360 92 Q 360 92 480 92"
        fill="none" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,4"
        marker-end="url(#arrow-indigo)"/>
  <text x="336" y="264" fill="#818cf8" font-size="10" text-anchor="middle" transform="rotate(-90, 336, 264)">MCP Protocol (stdio)</text>

  <!-- ═══════════════════════════════════════════════════
       LEGEND
       ═══════════════════════════════════════════════════ -->
  <rect x="40" y="500" width="740" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="410" y="520" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.5">LEGEND</text>

  <!-- Pipeline stage -->
  <rect x="60" y="530" width="18" height="12" rx="3" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="84" y="541" fill="#cbd5e1" font-size="10">Pipeline stage</text>

  <!-- Input / Auth -->
  <rect x="60" y="552" width="18" height="12" rx="3" fill="#78350f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="84" y="563" fill="#cbd5e1" font-size="10">Input / Auth</text>

  <!-- HTTP Client -->
  <rect x="60" y="574" width="18" height="12" rx="3" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="84" y="585" fill="#cbd5e1" font-size="10">HTTP Client</text>

  <!-- Data flow -->
  <line x1="210" y1="536" x2="228" y2="536" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="234" y="540" fill="#cbd5e1" font-size="10">Data flow</text>

  <!-- MCP protocol -->
  <line x1="210" y1="558" x2="228" y2="558" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="234" y="562" fill="#cbd5e1" font-size="10">MCP protocol</text>

  <!-- API response -->
  <line x1="210" y1="580" x2="228" y2="580" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="234" y="584" fill="#cbd5e1" font-size="10">API response</text>

  <!-- Upstream API legend -->
  <rect x="370" y="530" width="18" height="12" rx="3" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="394" y="541" fill="#cbd5e1" font-size="10">Upstream API</text>

  <!-- Stage artifact -->
  <text x="370" y="563" fill="#94a3b8" font-size="10" font-style="italic">italic text</text>
  <text x="394" y="563" fill="#cbd5e1" font-size="10">= stage output artifact</text>

  <!-- ═══════════════════════════════════════════════════
       Arrow markers
       ═══════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
  </defs>
</svg>
