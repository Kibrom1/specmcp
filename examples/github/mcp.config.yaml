# specmcp example — GitHub REST API
# Exposes a curated subset of GitHub endpoints useful to LLM agents.
# Full spec: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.json
#
# Run: specmcp serve --config examples/github/mcp.config.yaml
version: "1"

spec:
  source: "https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.json"

auth:
  BearerAuth:
    type: bearer
    value_from: env(GITHUB_TOKEN)

server:
  # Only expose the operations most useful to an LLM agent.
  # Remove or expand this list to expose more.
  include_operations:
    - repos/get
    - repos/list-for-authenticated-user
    - issues/list-for-repo
    - issues/get
    - issues/create
    - issues/create-comment
    - pulls/list
    - pulls/get
    - search/repos
    - search/issues-and-pull-requests

dispatch:
  default_timeout_seconds: 30
  response_size_limit_bytes: 524288   # 512 KiB — GitHub responses can be large
  text_truncate_bytes: 131072         # 128 KiB
  tls_verify: true

simplify:
  truncate_description_chars: 400
  drop_spec_metadata: true
  collapse_unions: true

operations:
  repos/get:
    rename: get_repo
    description: "Get a GitHub repository by owner and name."
  repos/list-for-authenticated-user:
    rename: list_my_repos
    description: "List repositories for the authenticated user."
  issues/list-for-repo:
    rename: list_issues
    description: "List issues for a repository. Filter by state (open/closed/all)."
  issues/get:
    rename: get_issue
    description: "Get a single issue by number."
  issues/create:
    rename: create_issue
    description: "Create a new issue in a repository."
  issues/create-comment:
    rename: comment_on_issue
    description: "Add a comment to an issue."
  pulls/list:
    rename: list_pull_requests
    description: "List pull requests for a repository."
  pulls/get:
    rename: get_pull_request
    description: "Get a single pull request by number."
  search/repos:
    rename: search_repos
    description: "Search GitHub repositories."
  search/issues-and-pull-requests:
    rename: search_issues
    description: "Search GitHub issues and pull requests."

transport:
  default: stdio
